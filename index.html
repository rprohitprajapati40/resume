<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form</title>
  </head>
  <body>
    <h1>Fill Up The Form</h1>
    <form action="">
      <label for="">First Name </label>
      <input type="text" />
      <br />
      <label for="">Second Name</label>
      <input type="text" />
      <br />
      <label for="">email</label>
      <input type="email" />
      <br />
      <label for="">password</label>
      <input type="password" />

      <br />
      <br />
      <label for="">your gender:</label>
      <br />
      <input type="radio" name="gender" id="male" value="male" />
      <label for="male">Male</label>
      <br />
      <input type="radio" name="gender" id="female" value="female" />
      <label for="female">Female</label>
      <br />
      <input type="radio" name="gender" id="other" value="other" />
      <label for="other">Other</label>
      <br />
      <br />
      <label for="color">your favourite color</label>
      <input type="color" id="color" />
      <br />

      <label for="cars">Car Models</label>
      <select name="" id="cars">
        <option value="" selected disabled hidden><--select a car--></option>
        <option value="">alto</option>
        <option value="">nano</option>
        <option value="">ertiga</option>
        <option value="">i20</option>
        <option value="">be6</option>
      </select>

      <br />
      <input type="reset" />

      <br />
      <input type="submit" />
      <label for="area"></label>
      <textarea name="feedback" id="area" placeholder="feedback"></textarea>
    </form>
  </body>
</html>
